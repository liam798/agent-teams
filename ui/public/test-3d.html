<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3DжёІжҹ“жөӢиҜ•</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: sans-serif;
            background: #1a1a2e;
            color: white;
        }
        #canvas-container {
            width: 100%;
            height: 400px;
            border: 2px solid #6366f1;
            border-radius: 8px;
            margin: 20px 0;
            background: #1a1a2e;
        }
        .info {
            background: #2a2a2a;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
        }
        #log {
            background: #000;
            color: #0f0;
            padding: 10px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <h1>3DжёІжҹ“зӣҙжҺҘжөӢиҜ•</h1>
    <div class="info">
        <p>иҝҷдёӘйЎөйқўзӣҙжҺҘжөӢиҜ•Three.jsе’ҢWebGLпјҢдёҚдҫқиө–React</p>
        <button onclick="test3D()">ејҖе§ӢжөӢиҜ•</button>
    </div>
    
    <div id="canvas-container"></div>
    
    <div class="info">
        <h3>жөӢиҜ•ж—Ҙеҝ—пјҡ</h3>
        <div id="log"></div>
    </div>
    
    <script type="module">
        const logDiv = document.getElementById('log');
        
        function log(message, type = 'info') {
            const time = new Date().toLocaleTimeString();
            const color = type === 'error' ? '#f00' : type === 'success' ? '#0f0' : '#0ff';
            logDiv.innerHTML += `<div style="color: ${color}">[${time}] ${message}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(message);
        }
        
        window.test3D = async function() {
            log('ејҖе§ӢжөӢиҜ•3DжёІжҹ“...');
            
            // жЈҖжҹҘWebGL
            const canvas = document.createElement('canvas');
            const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
            
            if (!gl) {
                log('вқҢ WebGLдёҚж”ҜжҢҒпјҒ', 'error');
                return;
            }
            
            log('вң… WebGLж”ҜжҢҒжӯЈеёё', 'success');
            log(`Vendor: ${gl.getParameter(gl.VENDOR)}`);
            log(`Renderer: ${gl.getParameter(gl.RENDERER)}`);
            log(`Version: ${gl.getParameter(gl.VERSION)}`);
            
            try {
                // еҠЁжҖҒеҜје…ҘThree.js
                log('жӯЈеңЁеҠ иҪҪThree.js...');
                const THREE = await import('https://cdn.skypack.dev/three@0.182.0');
                log(`вң… Three.jsеҠ иҪҪжҲҗеҠҹ (v${THREE.REVISION})`, 'success');
                
                // еҲӣе»әеңәжҷҜ
                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);
                const renderer = new THREE.WebGLRenderer({ 
                    canvas: canvas,
                    antialias: true,
                    alpha: false
                });
                
                const container = document.getElementById('canvas-container');
                const width = container.clientWidth;
                const height = 400;
                
                renderer.setSize(width, height);
                renderer.setClearColor(0x1a1a2e, 1);
                container.appendChild(canvas);
                
                log(`Canvasе°әеҜё: ${width}x${height}`, 'success');
                
                // ж·»еҠ жөӢиҜ•еҜ№иұЎ
                const geometry = new THREE.BoxGeometry(1, 1, 1);
                const material = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
                const cube = new THREE.Mesh(geometry, material);
                scene.add(cube);
                
                // ж·»еҠ зҪ‘ж ј
                const gridHelper = new THREE.GridHelper(10, 10, 0x4a5568, 0x2d3748);
                scene.add(gridHelper);
                
                // ж·»еҠ е…үжәҗ
                const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
                scene.add(ambientLight);
                
                const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
                directionalLight.position.set(5, 5, 5);
                scene.add(directionalLight);
                
                camera.position.z = 5;
                camera.position.y = 3;
                camera.lookAt(0, 0, 0);
                
                log('вң… еңәжҷҜеҲӣе»әжҲҗеҠҹ', 'success');
                
                // жёІжҹ“еҫӘзҺҜ
                function animate() {
                    requestAnimationFrame(animate);
                    cube.rotation.x += 0.01;
                    cube.rotation.y += 0.01;
                    renderer.render(scene, camera);
                }
                
                animate();
                log('вң… жёІжҹ“еҫӘзҺҜеҗҜеҠЁ', 'success');
                log('еә”иҜҘиғҪзңӢеҲ°ж—ӢиҪ¬зҡ„з»ҝиүІз«Ӣж–№дҪ“', 'success');
                
            } catch (error) {
                log(`вқҢ й”ҷиҜҜ: ${error.message}`, 'error');
                log(error.stack, 'error');
            }
        };
        
        // иҮӘеҠЁејҖе§ӢжөӢиҜ•
        setTimeout(() => {
            test3D();
        }, 500);
    </script>
</body>
</html>
